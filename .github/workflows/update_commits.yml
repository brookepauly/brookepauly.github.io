name: Update Commits

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch commits
        run: |
          curl -X POST \
          -H "Authorization: bearer ${{ secrets.PERSONAL_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"query": "{ viewer { contributionsCollection { commitContributionsByRepository(maxRepositories: 50) { contributions(first: 100) { nodes { occurredAt } } repository { name isPrivate } } } } }"}' \
          https://api.github.com/graphql \
          > commits.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add commits.json
          git commit -m "update commits" || echo "no changes"
          git push