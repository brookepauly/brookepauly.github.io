name: Update Commits

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch commits
        run: |
          FROM_DATE=$(date -u -d "1 year ago last sunday" +"%Y-%m-%dT00:00:00Z")
          TO_DATE=$(date -u +"%Y-%m-%dT23:59:59Z")

          curl -X POST \
          -H "Authorization: bearer ${{ secrets.PERSONAL_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "{\"query\": \"{ viewer { contributionsCollection(from: \\\"$FROM_DATE\\\", to: \\\"$TO_DATE\\\") { contributionCalendar { totalContributions weeks { contributionDays { contributionCount date } } } } } }\"}" \
          https://api.github.com/graphql \
          > commits.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add commits.json
          git commit -m "update commits" || echo "no changes"
          git push