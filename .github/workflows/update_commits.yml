name: Update Commits

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test token
        run: |
          curl -H "Authorization: token ${{ secrets.PERSONAL_TOKEN }}" \
          https://api.github.com/user

      - name: Fetch commits
        run: |
          response=$(curl -H "Authorization: token ${{ secrets.PERSONAL_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/user/events?per_page=100)
          echo "$response"
          echo "$response" > commits.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add commits.json
          git commit -m "update commits" || echo "no changes"
          git push