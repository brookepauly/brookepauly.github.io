<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="projects.css">
  </head>
  <body>
    <div class="page_container">

      <div class="left_side">
        <p style="color: white; font-size: 13px; margin-bottom: 8px;">246 contributions in the last year</p>
        <table id="contribution-table"></table>
      </div>

      <div class="slider">
        <div class="slides">
          <div id="slide-1">Project one content</div>
          <div id="slide-2">Project two content</div>
          <div id="slide-3">Project three content</div>
        </div>
      </div>

    </div>

    <script>
      fetch('commits.json')
        .then(res => res.json())
        .then(data => {
          const weeks = data.data.viewer.contributionsCollection.contributionCalendar.weeks;
          const table = document.getElementById('contribution-table');

          weeks.forEach(week => {
            week.contributionDays.forEach(day => {
              const tr = document.createElement('tr');
              const td = document.createElement('td');
              const count = day.contributionCount;
              td.title = `${day.date}: ${count} contributions`;
              td.className = `color-${count === 0 ? 0 : count < 5 ? 1 : count < 10 ? 2 : count < 15 ? 3 : 4}`;
              tr.appendChild(td);
              table.appendChild(tr);
            });
          });
        });
    </script>

  </body>
</html>
