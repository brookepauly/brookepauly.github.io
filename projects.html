<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="projects.css">
  </head>
  <body>
    <div class="page_container">

      <div class="left_side">
        <div id="commit_history">
          <div id="commit_count"></div>
          <table id="contribution-table"></table>
        </div>
      </div>

      <div class="slider">
        <div class="slides">
          <div id="slide-1">Project one content</div>
          <div id="slide-2">Project two content</div>
          <div id="slide-3">Project three content</div>
        </div>
      </div>

    </div>

    <script>
      fetch('commits.json')
      .then(res => res.json())
      .then(data => {
        const contributions = data.data.viewer.contributionsCollection.contributionCalendar;
        const weeks = contributions.weeks;
        const contributionTable = document.getElementById('contribution-table');

        for (let dayOfWeek = 0; dayOfWeek < 7; dayOfWeek++) {
          const row = document.createElement('tr');
          for (let weekIndex = 0; weekIndex < weeks.length; weekIndex++) {
            const contributionDay = weeks[weekIndex].contributionDays[dayOfWeek];
            const count = contributionDay ? contributionDay.contributionCount : 0;
            const td = document.createElement('td');
            td.className = `color-${count < 5 ? 0 : count < 10 ? 1 : count < 15 ? 2 : count < 20 ? 3 : 4}`;
            row.appendChild(td);
          }
          contributionTable.appendChild(row);
        }
      });
    </script>

  </body>
</html>
