<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="projects.css">
  </head>
  <body>
    <div class="page_container">

      <div class="left_side">
        <div id="commit_history">
          <div id="commit_count"></div>
        </div>
      </div>

      <div class="slider">
        <div class="slides">
          <div id="slide-1">Project one content</div>
          <div id="slide-2">Project two content</div>
          <div id="slide-3">Project three content</div>
        </div>
      </div>

    </div>

    <script>
      fetch('commits.json')
      .then(res => res.json())
      .then(data => {
        const repos = data.data.user.contributionsCollection.commitContributionsByRepository;
        
        let totalCommits = 0;
        repos.forEach(repo => {
          totalCommits += repo.contributions.nodes.length;
        });

        document.getElementById('commit_count').innerHTML = 
          `<p style="color: white;">${totalCommits} commits in the past year</p>`;
      });
    </script>

  </body>
</html>
