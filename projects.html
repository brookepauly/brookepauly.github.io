<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="projects.css">
  </head>
  <body>
    <div class="page_container">

      <div class="left_side">
        <div id="commit_count"></div>
        <table id="contribution-table"></table>
      </div>

      <div class="slider">
        <div class="slides">
          <div id="slide-1"> Project one content </div>
          <div id="slide-2"> 
            <iframe src = "Files\PPE presentation.pptx.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH"
            width = "100%"
            height = "100%"
            allowfullscreen = "true"
            frameborder = "0"> </iframe>
          </div>
          <div id="slide-3"> Project three content </div>
        </div>
      </div>

    </div>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
      fetch('commits.json')
        .then(res => res.json())
        .then(data => {
          const contributions = data.data.viewer.contributionsCollection.contributionCalendar;
          const weeks = contributions.weeks;
          const contributionTable = document.getElementById('contribution-table');

          document.getElementById('commit_count').innerHTML = 
            `<p style="color: white;">${contributions.totalContributions} Github commits in the past year</p>`;

          weeks.forEach(week => {
            const row = document.createElement('tr');
            week.contributionDays.forEach(day => {
              const td = document.createElement('td');
              const count = day.contributionCount;
              td.className = `color-${count === 0 ? 0 : count < 5 ? 1 : count < 10 ? 2 : count < 15 ? 3 : 4}`;
              row.appendChild(td);
            });
            contributionTable.appendChild(row);
          });
        })
        .catch(err => console.error('Error:', err));
    });
    </script>

  </body>
</html>
